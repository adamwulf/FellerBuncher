name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  thread-sanitizer:
    name: ThreadSanitizer (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # The race tests are only meaningful under TSan (-strict-concurrency
      # proves Sendable, not that an @unchecked claim holds). On pre-release
      # macOS/Xcode, both `swift test --sanitize=thread` and `xcodebuild
      # -enableThreadSanitizer` fail to load the TSan runtime ("Sanitizer load
      # violates platform policy" / runner-bootstrap crash). xcodebuild runs the
      # tests through a properly-signed test host, so on the stable runner image
      # the TSan runtime loads — this job is where TSan coverage actually runs.
      - name: Test under ThreadSanitizer
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme FellerBuncher \
            -destination 'platform=macOS' \
            -enableThreadSanitizer YES \
            -resultBundlePath TestResults.xcresult
